
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Trading Analizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e0e6ff;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(circle, rgba(59, 130, 246, 0.08) 1px, transparent 1px);
    background-size: 30px 30px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(34, 211, 238, 0.05) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }
  header {
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo-thunder {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    text-shadow: 0 0 20px rgba(234, 179, 8, 0.8), 0 0 40px rgba(234, 179, 8, 0.4);
    filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.6));
    animation: thunderGlow 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes thunderGlow {
    0%, 100% { text-shadow: 0 0 20px rgba(234, 179, 8, 0.8), 0 0 40px rgba(234, 179, 8, 0.4); filter: drop-shadow(0 0 10px rgba(234, 179, 8, 0.6)); }
    50% { text-shadow: 0 0 30px rgba(234, 179, 8, 1), 0 0 60px rgba(234, 179, 8, 0.6); filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.8)); }
  }
  header h1 {
    font-size: 42px;
    font-weight: 700;
    margin: 0 0 4px;
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #eab308 0%, #fbbf24 50%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  header p {
    color: #64748b;
    font-size: 14px;
    margin: 0;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.3px;
  }
  #dropzone {
    border: 2px dashed rgba(59, 130, 246, 0.35);
    border-radius: 16px;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(30px);
    padding: 60px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.04);
  }
  #dropzone:hover, #dropzone.dragover {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08);
  }
  #dropzone .icon { font-size: 48px; margin-bottom: 12px; }
  #dropzone .main { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: #cbd5e1; }
  #dropzone .sub { font-size: 14px; color: #64748b; }
  #fileInput { display: none; }
  #errorBox {
    display: none;
    background: rgba(220, 38, 38, 0.05);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: #fca5a5;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    margin-top: 16px;
  }
  #fileBar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: rgba(15, 23, 42, 0.4);
    border: 1px solid rgba(59, 130, 246, 0.15);
    border-radius: 12px;
    padding: 12px 18px;
    margin-top: 16px;
    font-size: 13px;
    color: #94a3b8;
    flex-wrap: wrap;
    gap: 10px;
  }
  #fileBar button {
    border: 1px solid rgba(59, 130, 246, 0.25);
    background: rgba(59, 130, 246, 0.1);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    color: #3b82f6;
    font-weight: 500;
    transition: all 0.2s;
  }
  #fileBar button:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: rgba(59, 130, 246, 0.5);
  }
  #dashboard { display: none; margin-top: 32px; }
  .account-line {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 24px;
    padding: 14px 16px;
    background: rgba(15, 23, 42, 0.4);
    border-left: 3px solid rgba(59, 130, 246, 0.4);
    border: 1px solid rgba(59, 130, 246, 0.1);
    border-radius: 8px;
    position: relative;
  }
  .account-line b { color: #3b82f6; font-weight: 600; }
  .neon-indicator {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 8px;
    height: 8px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ff88, 0 0 16px rgba(0, 255, 136, 0.6), inset 0 0 4px rgba(255, 255, 255, 0.5);
    animation: neonFlicker 1.5s ease-in-out infinite;
  }
  @keyframes neonFlicker {
    0%, 100% { 
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88, 0 0 16px rgba(0, 255, 136, 0.6), inset 0 0 4px rgba(255, 255, 255, 0.5);
      opacity: 1;
    }
    50% { 
      background: #00dd77;
      box-shadow: 0 0 16px #00ff88, 0 0 32px rgba(0, 255, 136, 0.8), inset 0 0 6px rgba(255, 255, 255, 0.7);
      opacity: 0.85;
    }
  }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 16px;
    max-height: 128px;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }
  .stat-grid.expanded { max-height: 600px; }
  .stat-item {
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 10px;
    padding: 16px;
    transition: all 0.3s;
  }
  .stat-item:hover {
    border-color: rgba(59, 130, 246, 0.3);
    background: rgba(59, 130, 246, 0.06);
  }
  .stat-label {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: #e0e6ff;
  }
  .stat-value.pos { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
  .stat-value.neg { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.6); }
  .stat-toggle {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  .stat-toggle-btn {
    border: 1px solid rgba(59, 130, 246, 0.25);
    background: rgba(59, 130, 246, 0.08);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    color: #3b82f6;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-toggle-btn:hover {
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(59, 130, 246, 0.4);
  }
  .stat-toggle-btn.active {
    background: rgba(59, 130, 246, 0.25);
    border-color: rgba(59, 130, 246, 0.6);
    color: #0ea5e9;
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 28px 0 12px 0;
    gap: 12px;
  }
  .section-title {
    font-size: 12px;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-left: 12px;
    position: relative;
    margin: 0;
    flex: 1;
  }
  .section-title::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 16px;
    background: linear-gradient(180deg, #3b82f6 0%, #06b6d4 100%);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
  }
  .chart-box {
    position: relative;
    height: 280px;
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.3s;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.03);
    margin-bottom: 16px;
  }
  .chart-box:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08), 0 12px 40px rgba(59, 130, 246, 0.1);
  }
  .chart-box canvas { position: relative; z-index: 1; }
  .mini-chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 1024px) { .mini-chart-grid { grid-template-columns: 1fr; } }
  .mini-chart-box {
    position: relative;
    height: 160px;
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 10px;
    padding: 12px;
    transition: all 0.3s;
    box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.02);
  }
  .mini-chart-box:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
  }
  .mini-chart-box canvas { position: relative; z-index: 1; }
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 8px;
    font-size: 12px;
    color: #64748b;
    flex-wrap: wrap;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .summary-box {
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 14px;
    padding: 20px;
    margin-top: 0;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.03);
  }
  .summary-box:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08), 0 12px 40px rgba(59, 130, 246, 0.1);
  }
  .summary-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .summary-item { padding: 0; }
  .summary-label {
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .summary-value {
    font-size: 18px;
    font-weight: 700;
    color: #cbd5e1;
  }
  .consecutive-container {
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 14px;
    padding: 20px;
    margin-top: 0;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.03);
  }
  .consecutive-container:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08), 0 12px 40px rgba(59, 130, 246, 0.1);
  }
  .consecutive-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .consecutive-item {
    background: rgba(7, 14, 25, 0.5);
    border: 1px solid rgba(59, 130, 246, 0.1);
    border-radius: 10px;
    padding: 20px;
    transition: all 0.3s;
    border-left: 4px solid;
  }
  .consecutive-item:hover {
    border-color: rgba(59, 130, 246, 0.3);
    background: rgba(59, 130, 246, 0.05);
  }
  .consecutive-item.win { border-left-color: #00ff88; box-shadow: inset -2px 0 10px rgba(0, 255, 136, 0.1); }
  .consecutive-item.loss { border-left-color: #ff3366; box-shadow: inset -2px 0 10px rgba(255, 51, 102, 0.1); }
  .consecutive-label {
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .consecutive-value {
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 8px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .consecutive-value.win { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
  .consecutive-value.loss { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.6); }
  .consecutive-info {
    font-size: 13px;
    color: #cbd5a1;
    margin: 0;
    font-weight: 600;
  }
  .recent-trades-container {
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 14px;
    padding: 20px;
    margin-top: 0;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.03);
  }
  .recent-trades-container:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08), 0 12px 40px rgba(59, 130, 246, 0.1);
  }
  .trade-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }
  .trade-table th {
    background: rgba(59, 130, 246, 0.08);
    color: #3b82f6;
    padding: 12px 8px;
    text-align: left;
    font-weight: 600;
    border-bottom: 2px solid rgba(59, 130, 246, 0.15);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
  }
  .trade-table td {
    padding: 10px 8px;
    border-bottom: 1px solid rgba(59, 130, 246, 0.08);
    color: #cbd5e1;
  }
  .trade-table tr:hover {
    background: rgba(59, 130, 246, 0.05);
  }
  .trade-table tr:last-child td {
    border-bottom: none;
  }
  .trade-pl.win {
    color: #00ff88;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
  }
  .trade-pl.loss {
    color: #ff3366;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255, 51, 102, 0.4);
  }
  .trade-toggle {
    display: flex;
    justify-content: center;
  }
  .trade-toggle-btn {
    border: 1px solid rgba(59, 130, 246, 0.25);
    background: rgba(59, 130, 246, 0.08);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    cursor: pointer;
    color: #3b82f6;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .trade-toggle-btn:hover {
    background: rgba(59, 130, 246, 0.15);
    border-color: rgba(59, 130, 246, 0.4);
  }
  .debug-container {
    background: rgba(15, 23, 42, 0.3);
    border: 1px solid rgba(59, 130, 246, 0.12);
    border-radius: 14px;
    padding: 20px;
    margin-top: 0;
    box-shadow: inset 0 0 40px rgba(59, 130, 246, 0.03);
  }
  .debug-container:hover {
    border-color: rgba(59, 130, 246, 0.4);
    background: rgba(59, 130, 246, 0.08);
    box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.08), 0 12px 40px rgba(59, 130, 246, 0.1);
  }
  .debug-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid rgba(59, 130, 246, 0.15);
    gap: 12px;
    flex-wrap: wrap;
  }
  .debug-header strong {
    font-size: 13px;
    color: #3b82f6;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
  .debug-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(59, 130, 246, 0.08);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .debug-stats span { display: flex; align-items: center; gap: 4px; color: #94a3b8; }
  .debug-stats .value { color: #3b82f6; font-weight: 700; }
  .debug-box {
    font-size: 11px;
    color: #94a3b8;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    max-height: 400px;
    overflow-y: auto;
    background: rgba(7, 14, 25, 0.8);
    border-radius: 8px;
    padding: 12px;
    line-height: 1.6;
    border: 1px solid rgba(59, 130, 246, 0.08);
  }
  .debug-row {
    padding: 4px 0;
    border-left: 3px solid transparent;
    padding-left: 8px;
    word-break: break-all;
    transition: all 0.2s;
  }
  .debug-row:hover {
    background: rgba(59, 130, 246, 0.08);
    border-left-color: rgba(59, 130, 246, 0.4);
  }
  .debug-row.info { color: #3b82f6; border-left-color: #3b82f6; }
  .debug-row.success { color: #00ff88; border-left-color: #00ff88; }
  .debug-row.error { color: #ff3366; border-left-color: #ff3366; }
  .reset-link {
    display: inline-block;
    margin-top: 28px;
    font-size: 13px;
    color: #3b82f6;
    cursor: pointer;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 8px;
    transition: all 0.2s;
    border: none;
    background: transparent;
  }
  .reset-link:hover {
    color: #06b6d4;
    background: rgba(59, 130, 246, 0.1);
    padding: 8px 16px;
  }
  @media (max-width: 768px) {
    .wrap { padding: 24px 16px 60px; }
    header { flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 32px; }
    .logo-thunder { font-size: 40px; }
    #dropzone { padding: 40px 20px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-box { height: 200px; padding: 16px; }
    .summary-row { grid-template-columns: repeat(2, 1fr); }
    .consecutive-grid { grid-template-columns: repeat(2, 1fr); }
    .trade-table { font-size: 11px; }
    .trade-table th, .trade-table td { padding: 8px 4px; }
  }
  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 24px; }
    .mini-chart-grid { grid-template-columns: 1fr; }
    .summary-row { grid-template-columns: 1fr; }
    .consecutive-grid { grid-template-columns: 1fr; }
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: rgba(59, 130, 246, 0.02); }
  ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.15); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.3); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo-thunder">⚡</div>
    <div>
      <h1>Thunder Trade</h1>
      <p>Trading Data Analyzer</p>
    </div>
  </header>

  <div id="dropzone">
    <div class="icon">⚡</div>
    <div class="main">Klik atau drag & drop file</div>
    <div class="sub">Format: .htm / .html dari MT4 / MT5</div>
    <input type="file" id="fileInput" accept=".htm,.html,text/html">
  </div>

  <div id="fileBar">
    <span id="fileName"></span>
    <button id="changeFileBtn">✎ Ganti file</button>
  </div>

  <div id="errorBox"></div>

  <div id="dashboard">
    <div class="account-line" id="accountLine">
      <div class="neon-indicator"></div>
    </div>
    <div class="stat-grid" id="statGrid"></div>
    <div class="stat-toggle">
      <button class="stat-toggle-btn" id="statToggleBtn">Show More</button>
    </div>

    <div class="section-header">
      <h2 class="section-title">Equity Curve</h2>
    </div>
    <div class="chart-box"><canvas id="equityChart"></canvas></div>

    <div class="section-header">
      <h2 class="section-title">Consecutive Wins & Losses</h2>
    </div>
    <div class="consecutive-container">
      <div class="consecutive-grid" id="consecutiveStats"></div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Last 10 Trades</h2>
    </div>
    <div class="recent-trades-container">
      <table class="trade-table" id="tradeTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Symbol</th>
            <th>Lot</th>
            <th>P/L</th>
          </tr>
        </thead>
        <tbody id="tradeBody"></tbody>
      </table>
      <div class="trade-toggle">
        <button class="trade-toggle-btn" id="tradeToggleBtn">Show More</button>
      </div>
    </div>

    <div class="section-header">
      <h2 class="section-title">Deposit & Withdrawal</h2>
    </div>
    <div class="summary-box">
      <div class="summary-row" id="depositRow"></div>
    </div>

    <div class="mini-chart-grid">
      <div>
        <div class="section-header"><h2 class="section-title" style="margin:0">Win vs Loss</h2></div>
        <div class="mini-chart-box"><canvas id="winChart"></canvas></div>
        <div class="legend" id="winLegend"></div>
      </div>
      <div>
        <div class="section-header"><h2 class="section-title" style="margin:0">P/L per Instrumen</h2></div>
        <div class="mini-chart-box"><canvas id="symChart"></canvas></div>
      </div>
    </div>

    <div class="section-header"><h2 class="section-title">P/L per Bulan</h2></div>
    <div class="chart-box"><canvas id="monthChart"></canvas></div>

    <div class="section-header"><h2 class="section-title">P/L per Minggu</h2></div>
    <div class="chart-box"><canvas id="weekChart"></canvas></div>

    <div class="section-header">
      <h2 class="section-title">Parsing Log</h2>
    </div>
    <div class="debug-container" id="debugInfo"></div>

    <button class="reset-link" id="resetLink">Upload file lain</button>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileBar = document.getElementById('fileBar');
const fileName = document.getElementById('fileName');
const errorBox = document.getElementById('errorBox');
const dashboard = document.getElementById('dashboard');
const statGrid = document.getElementById('statGrid');
const statToggleBtn = document.getElementById('statToggleBtn');
const tradeToggleBtn = document.getElementById('tradeToggleBtn');
const tradeBody = document.getElementById('tradeBody');
let charts = [];
let allTrades = [];
let tradesExpanded = false;

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });
document.getElementById('changeFileBtn').addEventListener('click', () => fileInput.click());
document.getElementById('resetLink').addEventListener('click', () => {
  dashboard.style.display = 'none';
  dropzone.style.display = 'block';
  fileBar.style.display = 'none';
  errorBox.style.display = 'none';
  fileInput.value = '';
  statGrid.classList.remove('expanded');
  statToggleBtn.classList.remove('active');
  statToggleBtn.textContent = 'Show More';
  tradesExpanded = false;
  tradeToggleBtn.textContent = 'Show More';
});

statToggleBtn.addEventListener('click', () => {
  statGrid.classList.toggle('expanded');
  const isExpanded = statGrid.classList.contains('expanded');
  statToggleBtn.textContent = isExpanded ? 'Show Less' : 'Show More';
});

tradeToggleBtn.addEventListener('click', () => {
  tradesExpanded = !tradesExpanded;
  renderTrades();
  tradeToggleBtn.textContent = tradesExpanded ? 'Show Less' : 'Show More';
});

function handleFile(file) {
  errorBox.style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const result = parseStatement(e.target.result);
      if (!result.closedTrades.filter(t => t.type !== 'balance').length) throw new Error('Tidak ada transaksi tertutup.');
      renderDashboard(result);
      fileName.textContent = '📄 ' + file.name;
      fileBar.style.display = 'flex';
      dropzone.style.display = 'none';
      dashboard.style.display = 'block';
    } catch (err) {
      errorBox.textContent = '⚠ Error: ' + err.message;
      errorBox.style.display = 'block';
    }
  };
  reader.onerror = () => { errorBox.textContent = '❌ Gagal baca file.'; errorBox.style.display = 'block'; };
  reader.readAsText(file);
}

function numFrom(cell) { if (!cell) return 0; const v = parseFloat(cell.textContent.replace(/[\s,]/g, '')); return isNaN(v) ? 0 : v; }

class DebugLogger {
  constructor() { this.logs = []; }
  info(msg) { this.logs.push({ type: 'info', msg }); }
  success(msg) { this.logs.push({ type: 'success', msg }); }
  error(msg) { this.logs.push({ type: 'error', msg }); }
  getHTML() { let html = ''; this.logs.forEach((log) => { const icons = { info: 'ℹ️', success: '✅', error: '❌' }; const icon = icons[log.type] || '•'; html += `<div class="debug-row ${log.type}">${icon} ${log.msg}</div>`; }); return html; }
}

function parseStatement(html) {
  const logger = new DebugLogger();
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const rows = Array.from(doc.querySelectorAll('table tr'));
  let section = '';
  const closedTrades = [];
  const openTrades = [];
  const summary = {};
  let accountName = '', accountNumber = '', currency = '';
  const deposits = [];
  const withdrawals = [];

  const headerText = doc.body.textContent;
  const accMatch = headerText.match(/Account:\s*([\w-]+)/);
  const nameMatch = headerText.match(/Name:\s*([^\n]+?)(?:\s{2,}|Currency|$)/);
  const curMatch = headerText.match(/Currency:\s*(\w+)/);
  if (accMatch) { accountNumber = accMatch[1].trim(); logger.success(`Account: ${accountNumber}`); }
  if (nameMatch) { accountName = nameMatch[1].trim(); logger.success(`Name: ${accountName}`); }
  if (curMatch) { currency = curMatch[1].trim(); logger.success(`Currency: ${currency}`); }

  for (let idx = 0; idx < rows.length; idx++) {
    const row = rows[idx];
    const cells = Array.from(row.cells);
    const rowText = cells.map(c => c.textContent.trim()).join(' | ');
    if (cells.length === 1) {
      const txt = cells[0].textContent.trim();
      if (/Closed Transactions/i.test(txt)) section = 'closed';
      else if (/Open Trades/i.test(txt)) section = 'open';
      else if (/Summary/i.test(txt)) section = 'summary';
      continue;
    }
    if (cells[0] && cells[0].textContent.trim() === 'Ticket') continue;
    if (rowText.toLowerCase().includes('withdrawal')) {
      const dateCell = cells[0]?.textContent.trim() || 'N/A';
      for (let i = cells.length - 1; i >= 0; i--) { const val = numFrom(cells[i]); if (val < 0) { withdrawals.push({ date: dateCell, amount: Math.abs(val) }); logger.info(`Withdrawal: ${Math.abs(val).toFixed(2)}`); break; } }
      continue;
    }
    if (rowText.toLowerCase().includes('deposit') && !rowText.toLowerCase().includes('withdrawal')) {
      const dateCell = cells[0]?.textContent.trim() || 'N/A';
      for (let i = cells.length - 1; i >= 0; i--) { const val = numFrom(cells[i]); if (val > 0) { deposits.push({ date: dateCell, amount: val }); logger.info(`Deposit: ${val.toFixed(2)}`); break; } }
      continue;
    }
    if (section === 'closed' && cells.length >= 3) {
      const typeCell = cells[2];
      const type = typeCell ? typeCell.textContent.trim().toLowerCase() : '';
      const dateCell = cells[1] ? cells[1].textContent.trim() : '';
      if (type.includes('withdrawal') || type.includes('deposit') || type.includes('credit')) continue;
      let amount = 0;
      for (let i = cells.length - 1; i >= 0; i--) { const val = numFrom(cells[i]); if (val !== 0) { amount = val; break; } }
      if (type === 'balance') {
        if (deposits.length === 0 && amount > 0) deposits.push({ date: dateCell, amount, isInitial: true });
        closedTrades.push({ type: 'balance', date: dateCell, pl: amount });
        continue;
      }
      if ((type === 'buy' || type === 'sell') && cells.length >= 14) {
        const hasColspan = cells[10].getAttribute('colspan');
        if (!hasColspan) {
          const commission = numFrom(cells[10]);
          const taxes = numFrom(cells[11]);
          const swap = numFrom(cells[12]);
          const profit = numFrom(cells[13]);
          const pl = Math.round((commission + taxes + swap + profit) * 100) / 100;
          closedTrades.push({ type, date: cells[8].textContent.trim(), item: cells[4].textContent.trim().toUpperCase(), lot: numFrom(cells[3]), pl });
        }
      }
    } else if (section === 'open' && cells.length >= 14) {
      const type = cells[2].textContent.trim();
      if ((type === 'buy' || type === 'sell') && !cells[10].getAttribute('colspan')) {
        const commission = numFrom(cells[10]);
        const taxes = numFrom(cells[11]);
        const swap = numFrom(cells[12]);
        const profit = numFrom(cells[13]);
        openTrades.push({ type, date: cells[1].textContent.trim(), item: cells[4].textContent.trim().toUpperCase(), lot: numFrom(cells[3]), pl: Math.round((commission + taxes + swap + profit) * 100) / 100 });
      }
    } else if (section === 'summary') {
      for (let i = 0; i < cells.length - 1; i++) {
        const label = cells[i].textContent.trim().replace(/:$/, '');
        const valText = cells[i + 1].textContent.trim();
        if (label && /-?[\d]/.test(valText)) { const val = parseFloat(valText.replace(/[\s,]/g, '')); if (!isNaN(val)) summary[label] = val; }
      }
    }
  }
  
  logger.success(`Total trades: ${closedTrades.filter(t => t.type !== 'balance').length}`);
  return { closedTrades, openTrades, summary, accountName, accountNumber, currency, deposits, withdrawals, logger };
}

function fmt(v) { const s = Math.abs(v).toLocaleString('en-US', { maximumFractionDigits: 0 }); return (v < 0 ? '-$' : '$') + s; }
function fmt2(v) { const s = Math.abs(v).toLocaleString('en-US', { maximumFractionDigits: 2 }); return (v < 0 ? '-$' : '$') + s; }

function calculateStreaks(trades) {
  const streaks = [];
  let current = null;
  trades.forEach(t => {
    const isWin = t.pl > 0;
    if (!current || current.type !== (isWin ? 'win' : 'loss')) {
      if (current) streaks.push(current);
      current = { type: isWin ? 'win' : 'loss', count: 1, profit: t.pl };
    } else {
      current.count++;
      current.profit += t.pl;
    }
  });
  if (current) streaks.push(current);
  return streaks;
}

function calculateMaxDrawdown(trades, startBalance) {
  let running = startBalance;
  let peak = startBalance;
  let maxDD = 0;
  trades.forEach(t => {
    running += t.pl;
    if (running > peak) peak = running;
    const dd = peak - running;
    if (dd > maxDD) maxDD = dd;
  });
  return maxDD;
}

function renderTrades() {
  let tradeHTML = '';
  const displayed = tradesExpanded ? allTrades.slice(0, 10) : allTrades.slice(0, 3);
  displayed.forEach(t => {
    const plClass = t.pl >= 0 ? 'win' : 'loss';
    tradeHTML += `<tr>
      <td>${t.date}</td>
      <td>${t.type.toUpperCase()}</td>
      <td><strong>${t.item}</strong></td>
      <td>${t.lot}</td>
      <td class="trade-pl ${plClass}">${(t.pl >= 0 ? '+' : '')}${fmt2(t.pl)}</td>
    </tr>`;
  });
  tradeBody.innerHTML = tradeHTML;
}

function renderDashboard(data) {
  charts.forEach(c => c.destroy());
  charts = [];
  const { closedTrades, openTrades, summary, accountName, accountNumber, currency, deposits, withdrawals, logger } = data;
  const trades = closedTrades.filter(t => t.type !== 'balance');
  allTrades = trades.slice().reverse();
  tradesExpanded = false;
  tradeToggleBtn.textContent = 'Show More';
  
  const streaks = calculateStreaks(trades);
  
  const wins = trades.filter(t => t.pl > 0).length;
  const losses = trades.filter(t => t.pl <= 0).length;
  const closedPL = trades.reduce((s, t) => s + t.pl, 0);
  const floatingPL = openTrades.reduce((s, t) => s + t.pl, 0);
  const balance = summary['Balance'];
  const equity = summary['Equity'];
  const totalPl = closedPL;
  const winRate = trades.length ? Math.round(wins / trades.length * 100) : 0;
  const grossWin = trades.filter(t => t.pl > 0).reduce((s, t) => s + t.pl, 0);
  const grossLoss = trades.filter(t => t.pl <= 0).reduce((s, t) => s + t.pl, 0);
  const pf = grossLoss !== 0 ? Math.abs(grossWin / grossLoss) : 0;
  const avgWinProfit = wins > 0 ? grossWin / wins : 0;
  const avgLossProfit = losses > 0 ? grossLoss / losses : 0;
  const startBalance = (balance !== undefined ? balance - totalPl : 0);
  const maxDD = calculateMaxDrawdown(trades, startBalance);
  const rrRatio = avgLossProfit !== 0 ? (avgWinProfit / Math.abs(avgLossProfit)).toFixed(2) : 0;

  const stats = [
    ['Balance', balance !== undefined ? fmt(balance) : '-', balance >= 0 ? 'pos' : 'neg'],
    ['Equity', equity !== undefined ? fmt(equity) : '-', equity >= 0 ? 'pos' : 'neg'],
    ['Closed P/L', fmt(closedPL), closedPL >= 0 ? 'pos' : 'neg'],
    ['Floating P/L', fmt(floatingPL), floatingPL >= 0 ? 'pos' : 'neg'],
    ['Total Trade', trades.length.toString(), ''],
    ['Win Rate', winRate + '%', ''],
    ['Profit Factor', pf.toFixed(2), ''],
    ['Avg P/L', fmt(totalPl / (trades.length || 1)), totalPl >= 0 ? 'pos' : 'neg'],
    ['Avg Win', fmt2(avgWinProfit), 'pos'],
    ['Avg Loss', fmt2(avgLossProfit), 'neg'],
    ['Max Drawdown', fmt(maxDD), 'neg'],
    ['Win Total', fmt(grossWin), 'pos'],
    ['Loss Total', fmt(grossLoss), 'neg'],
    ['Risk : Reward', rrRatio + ' : 1', rrRatio >= 1 ? 'pos' : 'neg']
  ];

  statGrid.innerHTML = stats.map(([label, value, type]) => 
    `<div class="stat-item"><div class="stat-label">${label}</div><div class="stat-value ${type}">${value}</div></div>`
  ).join('');

  document.getElementById('accountLine').innerHTML = (accountName ? `<b>${accountName}</b>` : '') + (accountNumber ? ` • ${accountNumber}` : '') + (currency ? ` • ${currency}` : '') + '<div class="neon-indicator"></div>';

  const totalDeposit = deposits.reduce((s, d) => s + d.amount, 0);
  const totalWithdrawal = withdrawals.reduce((s, w) => s + w.amount, 0);
  const netDeposit = totalDeposit - totalWithdrawal;
  const roiFromDeposit = totalDeposit > 0 ? (closedPL / totalDeposit * 100) : 0;

  document.getElementById('depositRow').innerHTML = `
    <div class="summary-item"><div class="summary-label">💰 Total Deposit</div><div class="summary-value pos">${fmt(totalDeposit)}</div></div>
    <div class="summary-item"><div class="summary-label">💸 Total Withdrawal</div><div class="summary-value neg">${fmt(totalWithdrawal)}</div></div>
    <div class="summary-item"><div class="summary-label">📊 Net Deposit</div><div class="summary-value ${netDeposit >= 0 ? 'pos' : 'neg'}">${fmt(netDeposit)}</div></div>
    <div class="summary-item"><div class="summary-label">📈 ROI</div><div class="summary-value ${roiFromDeposit >= 0 ? 'pos' : 'neg'}">${roiFromDeposit.toFixed(2)}%</div></div>
  `;

  const winStreaks = streaks.filter(s => s.type === 'win').sort((a, b) => b.count - a.count);
  const lossStreaks = streaks.filter(s => s.type === 'loss').sort((a, b) => b.count - a.count);
  const currentStreak = streaks.length ? streaks[streaks.length - 1] : null;

  let consecutiveHTML = '';
  if (winStreaks.length > 0) {
    const max = winStreaks[0];
    consecutiveHTML += `<div class="consecutive-item win"><div class="consecutive-label">🔥 Max Win Streak</div><div class="consecutive-value win">${max.count}</div><div class="consecutive-info">${fmt(max.profit)}</div></div>`;
  }
  if (lossStreaks.length > 0) {
    const max = lossStreaks[0];
    consecutiveHTML += `<div class="consecutive-item loss"><div class="consecutive-label">❄️ Max Loss Streak</div><div class="consecutive-value loss">${max.count}</div><div class="consecutive-info">${fmt(max.profit)}</div></div>`;
  }
  if (currentStreak) {
    consecutiveHTML += `<div class="consecutive-item ${currentStreak.type}"><div class="consecutive-label">📊 Current Streak</div><div class="consecutive-value ${currentStreak.type}">${currentStreak.count}</div><div class="consecutive-info">${fmt(currentStreak.profit)}</div></div>`;
  }

  document.getElementById('consecutiveStats').innerHTML = consecutiveHTML;

  renderTrades();

  document.getElementById('debugInfo').innerHTML = `
    <div class="debug-header"><strong>$ PARSING LOG</strong></div>
    <div class="debug-stats">
      <span>📝 Deposits: <span class="value">${deposits.length}</span></span>
      <span>💸 Withdrawals: <span class="value">${withdrawals.length}</span></span>
      <span>📊 Trades: <span class="value">${trades.length}</span></span>
    </div>
    <div class="debug-box">${logger.getHTML()}</div>
  `;

  let running = startBalance;
  const eqLabels = ['Start'], eqData = [Math.round(startBalance * 100) / 100];
  trades.forEach(t => {
    running += t.pl;
    eqLabels.push(t.date.slice(5, 10) || t.date);
    eqData.push(Math.round(running * 100) / 100);
  });

  const ink = '#64748b';
  const grid = 'rgba(59, 130, 246, 0.08)';

  charts.push(new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: { labels: eqLabels, datasets: [{ data: eqData, borderColor: '#eab308', backgroundColor: 'rgba(234, 179, 8, 0.12)', fill: true, borderWidth: 3, pointRadius: 0, pointHoverRadius: 7, pointBackgroundColor: '#eab308', pointBorderColor: '#fff', pointBorderWidth: 2, tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(10, 14, 25, 0.95)', titleColor: '#eab308', bodyColor: '#e0e6ff', borderColor: 'rgba(234, 179, 8, 0.6)', borderWidth: 2, padding: 10, cornerRadius: 8, callbacks: { label: c => '$' + c.parsed.y.toLocaleString() } } }, scales: { y: { grid: { color: grid, drawBorder: false }, ticks: { color: ink, callback: v => '$' + v.toLocaleString() } }, x: { grid: { display: false }, ticks: { color: ink, maxTicksLimit: 10 } } } }
  }));

  charts.push(new Chart(document.getElementById('winChart'), {
    type: 'doughnut',
    data: { labels: ['Win', 'Loss'], datasets: [{ data: [wins, losses], backgroundColor: ['rgba(0, 255, 136, 0.8)', 'rgba(255, 51, 102, 0.8)'], borderColor: 'rgba(15, 23, 42, 0.8)', borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  }));

  document.getElementById('winLegend').innerHTML = `<span><span class="dot" style="background:#00ff88; box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);"></span>Win ${wins}</span><span><span class="dot" style="background:#ff3366; box-shadow: 0 0 10px rgba(255, 51, 102, 0.6);"></span>Loss ${losses}</span>`;

  const symTotals = {};
  trades.forEach(t => { symTotals[t.item] = (symTotals[t.item] || 0) + t.pl; });

  charts.push(new Chart(document.getElementById('symChart'), {
    type: 'bar',
    data: { labels: Object.keys(symTotals).slice(0, 8), datasets: [{ data: Object.values(symTotals).slice(0, 8), backgroundColor: Object.values(symTotals).slice(0, 8).map(v => v >= 0 ? 'rgba(0, 255, 136, 0.8)' : 'rgba(255, 51, 102, 0.8)'), borderRadius: 4, borderSkipped: false, borderWidth: 1, borderColor: Object.values(symTotals).slice(0, 8).map(v => v >= 0 ? 'rgba(0, 255, 136, 1)' : 'rgba(255, 51, 102, 1)') }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: grid }, ticks: { color: ink, maxTicksLimit: 5 } }, x: { grid: { display: false }, ticks: { color: ink } } } }
  }));

  const monthTotals = {};
  trades.forEach(t => {
    const m = (t.date.match(/\d{4}\.\d{2}/) || [t.date.slice(0, 7)])[0];
    monthTotals[m] = (monthTotals[m] || 0) + t.pl;
  });
  const months = Object.keys(monthTotals).sort();

  charts.push(new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: { labels: months, datasets: [{ data: months.map(m => monthTotals[m]), backgroundColor: months.map(m => monthTotals[m] >= 0 ? 'rgba(0, 255, 136, 0.8)' : 'rgba(255, 51, 102, 0.8)'), borderRadius: 6, borderSkipped: false, borderWidth: 1, borderColor: months.map(m => monthTotals[m] >= 0 ? 'rgba(0, 255, 136, 1)' : 'rgba(255, 51, 102, 1)') }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: grid }, ticks: { color: ink } }, x: { grid: { display: false }, ticks: { color: ink } } } }
  }));

  const weekTotals = {};
  trades.forEach(t => {
    const date = new Date(t.date.replace(/\./g, '-'));
    const week = Math.ceil((date.getDate() + new Date(date.getFullYear(), date.getMonth(), 1).getDay()) / 7);
    const key = `W${week}`;
    weekTotals[key] = (weekTotals[key] || 0) + t.pl;
  });
  const weeks = Object.keys(weekTotals).sort();

  charts.push(new Chart(document.getElementById('weekChart'), {
    type: 'bar',
    data: { labels: weeks, datasets: [{ data: weeks.map(w => weekTotals[w]), backgroundColor: weeks.map(w => weekTotals[w] >= 0 ? 'rgba(0, 255, 136, 0.8)' : 'rgba(255, 51, 102, 0.8)'), borderRadius: 6, borderSkipped: false, borderWidth: 1, borderColor: weeks.map(w => weekTotals[w] >= 0 ? 'rgba(0, 255, 136, 1)' : 'rgba(255, 51, 102, 1)') }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: grid }, ticks: { color: ink } }, x: { grid: { display: false }, ticks: { color: ink } } } }
  }));
}
</script>
<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
</script></body>
